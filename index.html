<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@wou4d | Links</title>

<style>

:root{
--purple:#9b5de5;
--purple-dim:#6a00f4;
--purple-hi:#d084ff;
--pink:#e040fb;
--bg:#05050a;
--border:rgba(155,93,229,0.22);
--glass:rgba(155,93,229,0.07);
--muted:#55557a;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;}

body{
font-family:system-ui,-apple-system,sans-serif;
background:var(--bg);
color:#fff;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
}

.page{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:40px 20px;
}

.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;animation:breathe 6s ease-in-out infinite alternate;}
.orb-1{width:350px;height:350px;background:rgba(107,0,244,0.15);top:-100px;right:-60px;}
.orb-2{width:280px;height:280px;background:rgba(224,64,251,0.09);bottom:40px;left:-60px;animation-delay:2s;}
@keyframes breathe{from{opacity:0.6;transform:scale(1);}to{opacity:1;transform:scale(1.08);}}

.wrap{
position:relative;
z-index:2;
width:100%;
max-width:380px;
display:flex;
flex-direction:column;
align-items:center;
}

/* AVATAR */
.avatar-outer{
width:120px;
height:120px;
margin-bottom:16px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
animation:fadeUp .6s ease .1s both;
}

.avatar-img{
width:100%;
height:100%;
object-fit:contain;
display:block;
animation:avatarGlow 3s ease-in-out infinite alternate;
}

@keyframes avatarGlow{
from{filter:drop-shadow(0 0 6px rgba(155,93,229,0.8)) drop-shadow(0 0 16px rgba(155,93,229,0.4));}
to{filter:drop-shadow(0 0 12px rgba(208,132,255,1)) drop-shadow(0 0 28px rgba(224,64,251,0.6));}
}

.avatar-outer.flipping{
animation:coinFlip 0.8s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes coinFlip{
0%  {transform:rotateY(0deg) scale(1);}
25% {transform:rotateY(90deg) scale(0.85);}
50% {transform:rotateY(180deg) scale(1);}
75% {transform:rotateY(270deg) scale(0.85);}
100%{transform:rotateY(360deg) scale(1);}
}

/* USERNAME */
h1{
font-size:1.6rem;
font-weight:800;
letter-spacing:.02em;
background:linear-gradient(90deg,#fff 0%,var(--purple-hi) 25%,var(--pink) 50%,var(--purple-hi) 75%,#fff 100%);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
margin-bottom:8px;
cursor:default;
animation:fadeUp .6s ease .2s both, gradientSlide 3s linear infinite;
}

@keyframes gradientSlide{
0%{background-position:0% center;}
100%{background-position:200% center;}
}

h1:hover{
animation:gradientSlide .8s linear infinite, glitch .4s steps(2) infinite;
}

@keyframes glitch{
0%  {filter:drop-shadow(2px 0 #e040fb) drop-shadow(-2px 0 #d084ff);transform:translate(0);}
25% {filter:drop-shadow(-3px 0 #d084ff) drop-shadow(3px 0 #e040fb);transform:translate(-2px,1px);}
50% {filter:drop-shadow(3px 0 #e040fb) drop-shadow(-1px 0 #9b5de5);transform:translate(2px,-1px);}
75% {filter:drop-shadow(-2px 0 #d084ff) drop-shadow(2px 0 #e040fb);transform:translate(-1px,2px);}
100%{filter:drop-shadow(2px 0 #e040fb) drop-shadow(-2px 0 #d084ff);transform:translate(0);}
}

/* BIO */
.bio{
font-size:.78rem;
color:var(--muted);
letter-spacing:.1em;
margin-bottom:34px;
text-align:center;
animation:fadeUp .6s ease .3s both;
}

/* LINKS */
.links{width:100%;display:flex;flex-direction:column;gap:10px;}

.link{
position:relative;
display:flex;
align-items:center;
gap:14px;
padding:15px 18px;
border-radius:14px;
text-decoration:none;
color:#fff;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
transition:.3s;
overflow:hidden;
animation:fadeUp .5s ease var(--d,.4s) both;
}

.link:nth-child(1){--d:.35s;}
.link:nth-child(2){--d:.43s;}
.link:nth-child(3){--d:.51s;}
.link:nth-child(4){--d:.59s;}
.link:nth-child(5){--d:.67s;}

.link:hover{
border-color:var(--purple);
background:rgba(155,93,229,0.12);
box-shadow:0 0 20px rgba(155,93,229,.15);
}

.link::before{
content:'';
position:absolute;
left:0;top:0;bottom:0;
width:3px;
background:linear-gradient(to bottom,var(--purple-hi),var(--purple-dim));
opacity:0;
transition:.3s;
}
.link:hover::before{opacity:1;}

/* ICON */
.icon-wrap{
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.icon-wrap img{
width:28px;
height:28px;
display:block;
/* Add a subtle, multi-layered glow to the icon image */
filter: drop-shadow(0 0 5px var(--purple-hi)) drop-shadow(0 0 8px var(--pink));
/* The filter is on the image, so it follows the animation */
animation:iconFloat var(--fi-dur,3s) ease-in-out infinite var(--fi-del,0s);
transform-origin:center center;
}

.link:nth-child(1) .icon-wrap img{--fi-dur:2.8s;--fi-del:0.0s;}
.link:nth-child(2) .icon-wrap img{--fi-dur:3.3s;--fi-del:0.6s;}
.link:nth-child(3) .icon-wrap img{--fi-dur:2.5s;--fi-del:1.1s;}
.link:nth-child(4) .icon-wrap img{--fi-dur:3.6s;--fi-del:0.3s;}
.link:nth-child(5) .icon-wrap img{--fi-dur:2.9s;--fi-del:0.8s;}

@keyframes iconFloat{
0%,100%{transform:rotate(0deg) scale(1);}
33%    {transform:rotate(-6deg) scale(1.06);}
66%    {transform:rotate(5deg) scale(1.03);}
}

.icon-wrap.bounce img{
/* This temporary glow during the bounce will override the persistent glow */
animation:iconBounce .5s cubic-bezier(0.36,0.07,0.19,0.97) forwards !important;
filter:drop-shadow(0 0 6px rgba(155,93,229,0.9));
}

@keyframes iconBounce{
0%  {transform:scale(1) rotate(0deg);}
20% {transform:scale(1.4) rotate(-12deg);}
45% {transform:scale(.85) rotate(8deg);}
65% {transform:scale(1.15) rotate(-4deg);}
85% {transform:scale(.97) rotate(1deg);}
100%{transform:scale(1) rotate(0deg);}
}

/* LINK NAME */
.link-name{
font-size:.95rem;
font-weight:700;
letter-spacing:.03em;
flex:1;
transition:.3s;
}
.link:hover .link-name{color:var(--purple-hi);}

/* FOOTER */
footer{
margin-top:36px;
font-size:.65rem;
letter-spacing:.3em;
color:var(--muted);
text-transform:uppercase;
animation:fadeUp .6s ease .85s both;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page">
<div class="wrap">

  <div class="avatar-outer" id="avatar">
    <img class="avatar-img"
      src="https://raw.githubusercontent.com/bassslayer/wou4d.github.io/main/IMG_1743.png"
      alt="wou4d">
  </div>

  <h1>@wou4d</h1>
  <p class="bio">All my links in one place</p>

  <div class="links">

<a class="link" href="https://youtube.com/@wou4d" target="_blank">
  <div class="icon-wrap"><img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/youtube.svg"></div>
  <span class="link-name">YouTube</span>
</a>

<a class="link" href="https://tiktok.com/@wou4d" target="_blank">
  <div class="icon-wrap"><img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/tiktok.svg"></div>
  <span class="link-name">TikTok</span>
</a>

<a class="link" href="https://instagram.com/wou4d" target="_blank">
  <div class="icon-wrap"><img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/instagram.svg"></div>
  <span class="link-name">Instagram</span>
</a>

<a class="link" href="https://open.spotify.com/user/avv6zw9u11gemdibx2h6u4689/playlists" target="_blank">
  <div class="icon-wrap"><img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/spotify.svg"></div>
  <span class="link-name">Spotify</span>
</a>

<a class="link" href="https://kick.com/wou4d" target="_blank">
  <div class="icon-wrap"><img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/kick.svg"></div>
  <span class="link-name">Kick</span>
</a>

  </div>

  <footer>© wou4d</footer>

</div>
</div>

<script>
// Coin flip
const avatar = document.getElementById('avatar');
avatar.addEventListener('click', () => {
  if (avatar.classList.contains('flipping')) return;
  avatar.classList.add('flipping');
  setTimeout(() => avatar.classList.remove('flipping'), 820);
});

// Icon bounce on tap & hover
function bounceIcon(link) {
  const icon = link.querySelector('.icon-wrap');
  if (!icon) return;
  icon.classList.remove('bounce');
  void icon.offsetWidth;
  icon.classList.add('bounce');
  setTimeout(() => icon.classList.remove('bounce'), 520);
}

document.querySelectorAll('.link').forEach(link => {
  link.addEventListener('mouseenter', () => bounceIcon(link));
  link.addEventListener('touchstart', () => bounceIcon(link), {passive:true});
});
</script>

</body>
</html>
