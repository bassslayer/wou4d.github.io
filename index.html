*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { width: 100%; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overflow-x: hidden;
}

/* ── ORBS ── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(110px);
  pointer-events: none;
  z-index: 0;
  animation: breathe 6s ease-in-out infinite alternate;
}
.orb-1 { width: 350px; height: 350px; background: rgba(107,0,244,0.15); top: -100px; right: -60px; }
.orb-2 { width: 280px; height: 280px; background: rgba(224,64,251,0.09); bottom: 40px; left: -60px; animation-delay: 2s; }
@keyframes breathe {
  from { opacity: 0.6; transform: scale(1); }
  to   { opacity: 1;   transform: scale(1.08); }
}

/* ── WRAP ── */
.wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── AVATAR ── */
.avatar-outer {
  position: relative;
  width: 112px;
  height: 112px;
  margin-bottom: 22px;
  animation: fadeUp 0.6s ease 0.1s both;
  cursor: pointer;
  flex-shrink: 0;
}
.avatar-ring {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: conic-gradient(var(--purple-hi), var(--purple-dim), var(--pink), var(--purple-hi));
  animation: spin 4s linear infinite;
  z-index: 0;
}
.avatar-bg {
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: var(--bg);
  z-index: 1;
}
.avatar-img {
  position: absolute;
  inset: 5px;
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  border-radius: 50%;
  object-fit: cover;
  z-index: 2;
}
.avatar-outer.flipping {
  animation: coinFlip 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.avatar-outer.flipping .avatar-ring {
  animation: spin 0.2s linear infinite;
  filter: drop-shadow(0 0 12px rgba(208,132,255,0.9));
}
@keyframes coinFlip {
  0%   { transform: rotateY(0deg) scale(1); }
  25%  { transform: rotateY(90deg) scale(0.85); filter: brightness(2); }
  50%  { transform: rotateY(180deg) scale(1); }
  75%  { transform: rotateY(270deg) scale(0.85); filter: brightness(2); }
  100% { transform: rotateY(360deg) scale(1); }
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── NAME ── */
h1 {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  background: linear-gradient(90deg, #fff 0%, var(--purple-hi) 25%, var(--pink) 50%, var(--purple-hi) 75%, #fff 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  animation: fadeUp 0.6s ease 0.2s both, gradientSlide 3s linear infinite;
  cursor: default;
}
@keyframes gradientSlide {
  0%   { background-position: 0% center; }
  100% { background-position: 200% center; }
}
h1:hover {
  animation: gradientSlide 0.8s linear infinite, glitch 0.4s steps(2) infinite;
}
@keyframes glitch {
  0%   { filter: drop-shadow(2px 0 #e040fb) drop-shadow(-2px 0 #d084ff); transform: translate(0); }
  25%  { filter: drop-shadow(-3px 0 #d084ff) drop-shadow(3px 0 #e040fb); transform: translate(-2px, 1px); }
  50%  { filter: drop-shadow(3px 0 #e040fb) drop-shadow(-1px 0 #9b5de5); transform: translate(2px, -1px); }
  75%  { filter: drop-shadow(-2px 0 #d084ff) drop-shadow(2px 0 #e040fb); transform: translate(-1px, 2px); }
  100% { filter: drop-shadow(2px 0 #e040fb) drop-shadow(-2px 0 #d084ff); transform: translate(0); }
}

/* ── BIO ── */
.bio {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 34px;
  text-align: center;
  animation: fadeUp 0.6s ease 0.3s both;
}

/* ── LINKS ── */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.link {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 15px 18px;
  border-radius: 14px;
  text-decoration: none;
  color: #fff;
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  overflow: hidden;
  animation: fadeUp 0.5s ease var(--d, 0.4s) both;
}
.link::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--purple-hi), var(--purple-dim));
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 3px 0 0 3px;
}
.link-shine {
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transition: left 0.5s ease;
  pointer-events: none;
}
.link:hover { border-color: var(--purple); background: rgba(155,93,229,0.12); box-shadow: 0 0 20px rgba(155,93,229,0.15); }
.link:hover::before { opacity: 1; }
.link:hover .link-shine { left: 150%; }

.link:nth-child(1) { --d: 0.35s; }
.link:nth-child(2) { --d: 0.43s; }
.link:nth-child(3) { --d: 0.51s; }
.link:nth-child(4) { --d: 0.59s; }
.link:nth-child(5) { --d: 0.67s; }

/* ── ICON WRAP ── */
.icon-wrap {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: iconFloat var(--fi-dur, 3s) ease-in-out infinite var(--fi-del, 0s);
}
.link:nth-child(1) .icon-wrap { --fi-dur: 2.8s; --fi-del: 0.0s; }
.link:nth-child(2) .icon-wrap { --fi-dur: 3.2s; --fi-del: 0.4s; }
.link:nth-child(3) .icon-wrap { --fi-dur: 2.6s; --fi-del: 0.8s; }
.link:nth-child(4) .icon-wrap { --fi-dur: 3.5s; --fi-del: 0.2s; }
.link:nth-child(5) .icon-wrap { --fi-dur: 3.0s; --fi-del: 0.6s; }

@keyframes iconFloat {
  0%, 100% { transform: scale(1) rotate(0deg); }
  35%       { transform: scale(1.08) rotate(-4deg); }
  65%       { transform: scale(1.04) rotate(3deg); }
}
.link:hover .icon-wrap {
  animation: iconBounce 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  filter: drop-shadow(0 0 6px rgba(155,93,229,0.9));
}
@keyframes iconBounce {
  0%   { transform: scale(1) rotate(0deg); }
  20%  { transform: scale(1.35) rotate(-10deg); }
  45%  { transform: scale(0.88) rotate(6deg); }
  65%  { transform: scale(1.12) rotate(-3deg); }
  85%  { transform: scale(0.96) rotate(1deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.icon-wrap svg, .icon-wrap img { width: 28px; height: 28px; object-fit: contain; display: block; }

/* ── LINK NAME ── */
.link-name {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  flex: 1;
  transition: color 0.3s, letter-spacing 0.3s;
}
.link:hover .link-name { color: var(--purple-hi); letter-spacing: 0.06em; }

/* ── ARROW ── */
.link-arrow {
  font-size: 0.8rem;
  color: var(--muted);
  transition: color 0.3s, transform 0.3s, opacity 0.3s;
  animation: arrowPulse 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes arrowPulse {
  0%, 100% { opacity: 0.4; transform: translateX(0); }
  50%       { opacity: 0.9; transform: translateX(2px); }
}
.link:hover .link-arrow { color: var(--purple-hi); transform: translateX(5px); animation: none; opacity: 1; }

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 2;
  margin-top: 36px;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
  animation: fadeUp 0.6s ease 0.85s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
