*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 56px 24px 40px;
  overflow-x: hidden;
}

/* ── ORBS ── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(110px);
  pointer-events: none;
  z-index: 0;
  animation: breathe 6s ease-in-out infinite alternate;
}
.orb-1 { width: 400px; height: 400px; background: rgba(107,0,244,0.15); top: -130px; right: -80px; }
.orb-2 { width: 300px; height: 300px; background: rgba(224,64,251,0.09); bottom: 40px; left: -80px; animation-delay: 2s; }

@keyframes breathe {
  from { opacity: 0.6; transform: scale(1); }
  to   { opacity: 1;   transform: scale(1.08); }
}

/* ── WRAP ── */
.wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── AVATAR ── */
.avatar-wrap {
  position: relative;
  width: 112px;
  height: 112px;
  margin-bottom: 22px;
  animation: fadeUp 0.6s ease 0.1s both;
}

.avatar-wrap::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: conic-gradient(var(--purple-hi), var(--purple-dim), var(--pink), var(--purple-hi));
  animation: spin 4s linear infinite;
  z-index: 0;
}

.avatar-wrap::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: var(--bg);
  z-index: 1;
}

.avatar-wrap img {
  position: absolute;
  inset: 5px;
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  border-radius: 50%;
  object-fit: cover;
  z-index: 2;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── NAME & BIO ── */
h1 {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  background: linear-gradient(135deg, #fff 20%, var(--purple-hi));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  animation: fadeUp 0.6s ease 0.2s both;
}

.bio {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 34px;
  text-align: center;
  animation: fadeUp 0.6s ease 0.3s both;
}

/* ── LINKS ── */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.link {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 15px 20px;
  border-radius: 14px;
  text-decoration: none;
  color: #fff;
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: transform 0.3s ease, border-color 0.3s, background 0.3s, box-shadow 0.3s;
  overflow: hidden;
  animation: fadeUp 0.5s ease var(--d, 0.4s) both;
}

.link::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--purple-hi), var(--purple-dim));
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 3px 0 0 3px;
}

.link::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transition: left 0.5s ease;
}

.link:hover {
  transform: translateX(5px);
  border-color: var(--purple);
  background: rgba(155,93,229,0.12);
  box-shadow: 0 0 20px rgba(155,93,229,0.15);
}

.link:hover::before { opacity: 1; }
.link:hover::after  { left: 150%; }

.link:nth-child(1) { --d: 0.35s; }
.link:nth-child(2) { --d: 0.43s; }
.link:nth-child(3) { --d: 0.51s; }
.link:nth-child(4) { --d: 0.59s; }
.link:nth-child(5) { --d: 0.67s; }

.link-icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  object-fit: contain;
}

.link-name {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  flex: 1;
}

.link-arrow {
  font-size: 0.8rem;
  color: var(--muted);
  transition: color 0.3s, transform 0.3s;
}

.link:hover .link-arrow {
  color: var(--purple-hi);
  transform: translateX(3px);
}

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 2;
  margin-top: 36px;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
  animation: fadeUp 0.6s ease 0.85s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
