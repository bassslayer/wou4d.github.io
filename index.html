<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@wou4d | Links</title>

<style>

:root{
--purple:#9b5de5;
--purple-dim:#6a00f4;
--purple-hi:#d084ff;
--pink:#e040fb;
--bg:#05050a;
--border:rgba(155,93,229,0.22);
--glass:rgba(155,93,229,0.07);
--muted:#55557a;
}

*,*::before,*::after{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
}

body{
font-family:system-ui,-apple-system,sans-serif;
background:var(--bg);
color:#fff;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
}

/* CENTER PAGE */

.page{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:40px 20px;
}

/* ORBS */

.orb{
position:fixed;
border-radius:50%;
filter:blur(110px);
pointer-events:none;
z-index:0;
animation:breathe 6s ease-in-out infinite alternate;
}

.orb-1{
width:350px;
height:350px;
background:rgba(107,0,244,0.15);
top:-100px;
right:-60px;
}

.orb-2{
width:280px;
height:280px;
background:rgba(224,64,251,0.09);
bottom:40px;
left:-60px;
animation-delay:2s;
}

@keyframes breathe{
from{opacity:.6;transform:scale(1);}
to{opacity:1;transform:scale(1.08);}
}

/* WRAP */

.wrap{
position:relative;
z-index:2;
width:100%;
max-width:380px;
display:flex;
flex-direction:column;
align-items:center;
}

/* AVATAR */

.avatar-outer{
position:relative;
width:118px;
height:118px;
margin-bottom:22px;
cursor:pointer;
overflow:hidden;
border-radius:50%;
animation:fadeUp .6s ease .1s both;
}

.avatar-ring{
position:absolute;
inset:-3px;
border-radius:50%;
background:conic-gradient(var(--purple-hi),var(--purple-dim),var(--pink),var(--purple-hi));
animation:spin 4s linear infinite;
z-index:0;
}

.avatar-bg{
position:absolute;
inset:2px;
border-radius:50%;
background:var(--bg);
z-index:1;
}

.avatar-img{
position:absolute;
inset:5px;
width:calc(100% - 10px);
height:calc(100% - 10px);
border-radius:50%;
object-fit:cover;
z-index:2;
}

.avatar-outer.flipping{
animation:coinFlip .8s cubic-bezier(.4,0,.2,1) forwards;
}

.avatar-outer.flipping .avatar-ring{
animation:spin .2s linear infinite;
filter:drop-shadow(0 0 12px rgba(208,132,255,.9));
}

@keyframes coinFlip{
0%{transform:rotateY(0) scale(1);}
25%{transform:rotateY(90deg) scale(.85);filter:brightness(2);}
50%{transform:rotateY(180deg) scale(1);}
75%{transform:rotateY(270deg) scale(.85);filter:brightness(2);}
100%{transform:rotateY(360deg) scale(1);}
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* NAME */

h1{
font-size:1.6rem;
font-weight:800;
letter-spacing:.02em;
background:linear-gradient(90deg,#fff 0%,var(--purple-hi) 25%,var(--pink) 50%,var(--purple-hi) 75%,#fff 100%);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:8px;
animation:fadeUp .6s ease .2s both,gradientSlide 3s linear infinite;
}

@keyframes gradientSlide{
0%{background-position:0% center;}
100%{background-position:200% center;}
}

/* BIO */

.bio{
font-size:.78rem;
color:var(--muted);
letter-spacing:.1em;
margin-bottom:34px;
text-align:center;
animation:fadeUp .6s ease .3s both;
}

/* LINKS */

.links{
width:100%;
display:flex;
flex-direction:column;
gap:10px;
}

.link{
position:relative;
display:flex;
align-items:center;
gap:14px;
padding:15px 18px;
border-radius:14px;
text-decoration:none;
color:#fff;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(20px);
transition:.3s;
overflow:hidden;
animation:fadeUp .5s ease var(--d,.4s) both;
}

.link:nth-child(1){--d:.35s}
.link:nth-child(2){--d:.43s}
.link:nth-child(3){--d:.51s}
.link:nth-child(4){--d:.59s}
.link:nth-child(5){--d:.67s}

.link::before{
content:'';
position:absolute;
left:0;
top:0;
bottom:0;
width:3px;
background:linear-gradient(to bottom,var(--purple-hi),var(--purple-dim));
opacity:0;
transition:.3s;
}

.link:hover{
border-color:var(--purple);
background:rgba(155,93,229,.12);
box-shadow:0 0 20px rgba(155,93,229,.15);
}

.link:hover::before{
opacity:1;
}

/* SHINE */

.link-shine{
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
transition:left .5s ease;
pointer-events:none;
}

.link:hover .link-shine{
left:150%;
}

/* ICON */

.icon-wrap{
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
animation:iconFloat var(--fi-dur,3s) ease-in-out infinite var(--fi-del,0s);
}

@keyframes iconFloat{
0%,100%{transform:scale(1) rotate(0)}
35%{transform:scale(1.08) rotate(-4deg)}
65%{transform:scale(1.04) rotate(3deg)}
}

.link:hover .icon-wrap{
animation:iconBounce .5s cubic-bezier(.36,.07,.19,.97) forwards;
filter:drop-shadow(0 0 6px rgba(155,93,229,.9));
}

@keyframes iconBounce{
0%{transform:scale(1)}
20%{transform:scale(1.35) rotate(-10deg)}
45%{transform:scale(.88) rotate(6deg)}
65%{transform:scale(1.12) rotate(-3deg)}
85%{transform:scale(.96)}
100%{transform:scale(1)}
}

.icon-wrap img{
width:28px;
height:28px;
object-fit:contain;
}

/* LINK NAME */

.link-name{
font-size:.95rem;
font-weight:700;
letter-spacing:.03em;
flex:1;
}

.link:hover .link-name{
color:var(--purple-hi);
letter-spacing:.06em;
}

/* FOOTER */

footer{
margin-top:36px;
font-size:.65rem;
letter-spacing:.3em;
color:var(--muted);
text-transform:uppercase;
animation:fadeUp .6s ease .85s both;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page">

<div class="wrap">

<div class="avatar-outer" id="avatar">
<div class="avatar-ring"></div>
<div class="avatar-bg"></div>

<img class="avatar-img"
src="https://raw.githubusercontent.com/bassslayer/wou4d.github.io/main/logo.png"
alt="wou4d"
onerror="this.src='https://raw.githubusercontent.com/bassslayer/wou4d.github.io/main/pfp.jpg'">

</div>

<h1>@wou4d</h1>
<p class="bio">All my links in one place</p>

<div class="links">

<a class="link" href="https://youtube.com/@wou4d" target="_blank">
<div class="icon-wrap">
<img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/youtube.svg">
</div>
<span class="link-name">YouTube</span>
<span class="link-shine"></span>
</a>

<a class="link" href="https://tiktok.com/@wou4d" target="_blank">
<div class="icon-wrap">
<img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/tiktok.svg">
</div>
<span class="link-name">TikTok</span>
<span class="link-shine"></span>
</a>

<a class="link" href="https://instagram.com/wou4d" target="_blank">
<div class="icon-wrap">
<img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/instagram.svg">
</div>
<span class="link-name">Instagram</span>
<span class="link-shine"></span>
</a>

<a class="link" href="https://open.spotify.com/" target="_blank">
<div class="icon-wrap">
<img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/spotify.svg">
</div>
<span class="link-name">Spotify</span>
<span class="link-shine"></span>
</a>

<a class="link" href="https://kick.com/wou4d" target="_blank">
<div class="icon-wrap">
<img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/kick.svg">
</div>
<span class="link-name">Kick</span>
<span class="link-shine"></span>
</a>

</div>
</div>

<footer>© wou4d🇲🇦</footer>

</div>

<script>

const avatar=document.getElementById("avatar");

avatar.addEventListener("click",()=>{
if(avatar.classList.contains("flipping")) return;

avatar.classList.add("flipping");

setTimeout(()=>{
avatar.classList.remove("flipping");
},850);

});

</script>

</body>
</html>
